<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Github Issue Tracker</title>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] ">


    <header class="flex bg-white justify-between w-11/12 mx-auto py-4">
        <div class="flex items-center gap-2">
            <img class="w-[36px]" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
            <div>
                <label class="input validator join-item">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" placeholder="Search issues..." required />
                </label>
            </div>
            <button class="btn btn-primary join-item">+ New Issue</button>
        </div>
    </header>
    <hr class="text-[#aaafaf]">
    <section class="w-10/12 mx-auto mt-[50px] space-y-4">
        <div class="flex gap-2 bg-white rounded-lg shadow-lg p-5">
            <button onclick="filterIssues('all',event)" class="btn w-20 btn-primary">All</button>
            <button onclick="filterIssues('open',event)" class="btn w-20">Open</button>
            <button onclick="filterIssues('closed',event)" class="btn w-20">Closed</button>
        </div>
        <div class="flex justify-between bg-white p-3 rounded-md shadow-lg">
            <div class="flex gap-3 items-center">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <p class="font-semibold text-[20px]"><span id="issue-count">50</span> Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="bg-[#00A96E] p-2 rounded-full"></span>
                <p>Open</p>
                <span class="bg-[#A855F7] p-2 rounded-full"></span>
                <p>Closed</p>
            </div>
        </div>
        <div id="loading-spinner" class="text-center py-10 hidden">
            <span class="loading loading-bars loading-xl"></span>
        </div>
        <div id="card-container" class="bg-white  grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3 p-4">
        </div>
    </section>



    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal.showModal()">open modal</button> -->
    <dialog id="my_modal" class="modal">
        <div class="modal-box">
            <div id="details-container" class="space-y-2">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="./js/script.js"></script>
</body>

</html>
