    <style>
        * {
            font-family: "Geist", sans-serif;
        }

<body class="bg-[#F8FAFC] ">
    <header class="flex bg-white justify-between w-11/12 mx-auto py-4">
        <div class="flex items-center gap-2">
            <img class="w-[36px]" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
            <div>
                <label class="input validator join-item">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="text" placeholder="Search issues..." required />
                </label>
            </div>
            <button class="btn btn-primary join-item">+ New Issue</button>
        </div>
    </header>
    <hr class="text-[#aaafaf]">
    <section class="w-10/12 mx-auto mt-[50px] space-y-4">
        <div class="flex gap-2 bg-white rounded-lg shadow-lg p-5">
            <button class="btn w-20 btn-primary">All</button>
            <button class="btn w-20 btn-primary">Open</button>
            <button class="btn w-20 btn-primary">Closed</button>
        </div>
        <div class="flex justify-between bg-white p-3 rounded-md shadow-lg">
            <div class="flex gap-3 items-center">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <p class="font-semibold text-[20px]"><span>50</span> Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="bg-[#00A96E] p-2 rounded-full"></span>
                <p>Open</p>
                <span class="bg-[#A855F7] p-2 rounded-full"></span>
                <p>Closed</p>
            </div>
        </div>
