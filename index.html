<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>Github Issue Tracker</title>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] py-10">
    <div class="p-8 max-w-[520px] mx-auto bg-white rounded-box">
        <div class="text-center space-y-3 pb-3">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">
            <h1 class="font-bold text-[24px]">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] ">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box border p-4 space-y-3">
            <label class="label text-[#3D3746] font-medium ">Username</label>
            <input type="text" id="user-name" class="input w-full" placeholder="Enter Username" />
            <p class="text-[#4A00FF]">Default: admin</p>

            <label class="label text-[#3D3746] font-medium ">Password</label>
            <input type="password" class="input w-full" maxlength="8" id="password" placeholder="Enter Password" />
            <p class="text-[#4A00FF]">Default: admin123</p>

            <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>

        <div class="space-y-4 text-center ">
            <div class="flex items-center gap-3">
                <hr class="w-full text-gray-400">
                <span>OR</span>
                <hr class="w-full text-gray-400">
            </div>
            <p class="text-[14px] text-[#64748B]">Demo Credentials:</p>
            <div>
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </div>
    </div>

    <script src="./js/login.js"></script>
</body>

</html>
